# Datore Auto-Merge & Deploy Agent
# Automatically merges claude/ feature branches into main after successful preview build
# Triggers: when a push to any claude/* branch results in a successful Vercel preview

name: Datore Deploy Agent

on:
  # Trigger when code is pushed to claude/ branches
  push:
    branches:
      - 'claude/**'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to merge into main (e.g. claude/feature-name-abc123)'
        required: true
        type: string
      skip_checks:
        description: 'Skip build verification before merge'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  # Step 1: Verify the branch builds successfully
  verify:
    name: Verify Build
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_checks }}
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build verification
        run: npx next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: TypeScript check
        run: npx tsc --noEmit
        continue-on-error: true

  # Step 2: Merge into main
  merge:
    name: Merge to Main
    runs-on: ubuntu-latest
    needs: [verify]
    if: ${{ always() && (needs.verify.result == 'success' || inputs.skip_checks) }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "Datore Deploy Agent"
          git config user.email "deploy@datore.app"

      - name: Fetch feature branch
        run: |
          BRANCH="${{ inputs.branch || github.ref_name }}"
          echo "Merging branch: $BRANCH"
          git fetch origin "$BRANCH"

      - name: Merge into main (fast-forward preferred)
        id: merge
        run: |
          BRANCH="${{ inputs.branch || github.ref_name }}"
          echo "🔀 Attempting fast-forward merge of $BRANCH into main..."

          # Try fast-forward first
          if git merge --ff-only "origin/$BRANCH"; then
            echo "merge_type=fast-forward" >> $GITHUB_OUTPUT
            echo "✅ Fast-forward merge successful"
          else
            echo "⚠️ Fast-forward not possible, attempting regular merge..."
            git merge "origin/$BRANCH" --no-edit -m "Merge $BRANCH into main [Datore Deploy Agent]"
            echo "merge_type=merge-commit" >> $GITHUB_OUTPUT
            echo "✅ Merge commit created"
          fi

      - name: Push to main
        run: |
          git push origin main
          echo "🚀 Pushed to main — Vercel will auto-deploy to production"

      - name: Summary
        run: |
          BRANCH="${{ inputs.branch || github.ref_name }}"
          echo "## 🚀 Datore Deploy Agent" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`$BRANCH\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Merge Type | ${{ steps.merge.outputs.merge_type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Target | \`main\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | Vercel auto-deploy triggered |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Production URL: https://datore.vercel.app" >> $GITHUB_STEP_SUMMARY
